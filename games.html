<!DOCTYPE html>
<html>
<head>
  <title>Games – Nailea Lopez's Webpage</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Games page extra styles ── */
    .games-hero {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }
    .games-hero h1 { margin-bottom: 0.25rem; }
    .games-hero p  { color: #555; margin-top: 0; }

    .game-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.5rem auto 0;
      max-width: 700px;
    }
    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid #333;
      border-radius: 8px 8px 0 0;
      background: #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tab-btn.active { background: #fff; border-bottom: 2px solid #fff; }
    .tab-btn:hover:not(.active) { background: #e0e0e0; }

    .game-panel {
      display: none;
      max-width: 700px;
      margin: 0 auto 2rem;
      padding: 1.5rem;
      border: 2px solid #333;
      border-radius: 0 0 12px 12px;
      background: #fff;
    }
    .game-panel.active { display: block; }

    /* ── Hangman ── */
    #hangman-canvas { display: block; margin: 0 auto 1rem; }
    #hangman-word {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 0.4rem;
      margin: 0.5rem 0;
      font-family: monospace;
    }
    #hangman-hint  { text-align: center; color: #666; font-style: italic; margin-bottom: 0.75rem; }
    #hangman-wrong { text-align: center; color: #c0392b; margin-bottom: 0.75rem; }
    .letter-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1rem;
    }
    .letter-grid button {
      width: 38px; height: 38px;
      border: 1px solid #999;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      background: #fafafa;
      cursor: pointer;
      transition: background 0.15s;
    }
    .letter-grid button:disabled { background: #ddd; color: #aaa; cursor: default; }
    #hangman-status { text-align: center; font-weight: bold; font-size: 1.1rem; min-height: 1.5rem; }
    #hangman-new-btn {
      display: block; margin: 0.75rem auto 0;
      padding: 0.5rem 1.5rem;
      background: #333; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.95rem; cursor: pointer;
    }
    #hangman-new-btn:hover { background: #555; }

    /* ── Crossword ── */
    #crossword-grid {
      display: grid;
      gap: 2px;
      margin: 0 auto 1rem;
      width: fit-content;
    }
    .cw-cell {
      position: relative;
      width: 40px; height: 40px;
    }
    .cw-cell.black { background: #222; border-radius: 3px; }
    .cw-cell input {
      width: 100%; height: 100%;
      text-align: center;
      text-transform: uppercase;
      font-size: 1.1rem;
      font-weight: bold;
      border: 1px solid #999;
      border-radius: 3px;
      background: #fff;
      caret-color: transparent;
      outline: none;
    }
    .cw-cell input:focus { border-color: #e74c3c; background: #fff9f9; }
    .cw-cell input.correct { background: #d5f5e3; }
    .cw-cell input.wrong   { background: #fadbd8; }
    .cw-number {
      position: absolute; top: 2px; left: 3px;
      font-size: 0.5rem; font-weight: bold; color: #333;
      pointer-events: none; line-height: 1;
    }
    .cw-clues { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .cw-clues div { flex: 1; min-width: 200px; }
    .cw-clues h4 { margin: 0 0 0.5rem; }
    .cw-clues ol { padding-left: 1.2rem; margin: 0; }
    .cw-clues li { margin-bottom: 0.35rem; font-size: 0.9rem; }
    .cw-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .cw-actions button {
      padding: 0.5rem 1.2rem;
      background: #333; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer;
    }
    .cw-actions button:hover { background: #555; }
    #cw-status { text-align: center; font-weight: bold; font-size: 1rem; min-height: 1.4rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
  </nav>

  <div class="games-hero">
    <h1 class="page-title">🎮 Game Room</h1>
    <p>Pick a game and play with friends!</p>
  </div>

  <!-- Tab buttons -->
  <div class="game-tabs">
    <button class="tab-btn active" onclick="showTab('hangman', this)">🪢 Hangman</button>
   
  </div>

  <!-- ══════════ HANGMAN PANEL ══════════ -->
  <div id="hangman" class="game-panel active">
    <canvas id="hangman-canvas" width="200" height="200"></canvas>
    <div id="hangman-hint"></div>
    <div id="hangman-word"></div>
    <div id="hangman-wrong"></div>
    <div class="letter-grid" id="letter-grid"></div>
    <div id="hangman-status"></div>
    <button id="hangman-new-btn" onclick="newHangmanGame()">New Word</button>
  </div>

  

  <footer class="page-footer">
    Copyright &copy; 2026 Nailea Lopez. All Rights Reserved.
  </footer>

  <script>
  // ═══════════════════════════════════
  //  TAB SWITCHING
  // ═══════════════════════════════════
  function showTab(id, btn) {
    document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  // ═══════════════════════════════════
  //  HANGMAN
  // ═══════════════════════════════════
  const words = [
    { word: "BAKING",     hint: "Nailea's favorite hobby in the kitchen" },
    { word: "HORSEBACK",  hint: "Nailea has been doing this since age 6" },
    { word: "AUSTIN",     hint: "City where UT is located" },
    { word: "BUSINESS",   hint: "Nailea's school at UT" },
    { word: "LONDON",     hint: "City with a famous red phone booth" },
    { word: "CROISSANT",  hint: "A classic French pastry" },
    { word: "GASTRONOMY", hint: "The study of food and culture" },
    { word: "TRAVEL",     hint: "One of Nailea's passions" },
    { word: "CUPCAKE",    hint: "A small single-serving cake" },
    { word: "SADDLE",     hint: "You sit on this when riding a horse" },
  ];

  let hSecret, hGuessed, hWrong;
  const maxWrong = 6;

  function newHangmanGame() {
    const pick = words[Math.floor(Math.random() * words.length)];
    hSecret  = pick.word;
    hGuessed = new Set();
    hWrong   = 0;
    document.getElementById('hangman-hint').textContent = "Hint: " + pick.hint;
    document.getElementById('hangman-status').textContent = '';
    buildLetterGrid();
    renderWord();
    renderWrong();
    drawGallows(0);
  }

  function buildLetterGrid() {
    const grid = document.getElementById('letter-grid');
    grid.innerHTML = '';
    for (let c = 65; c <= 90; c++) {
      const btn = document.createElement('button');
      btn.textContent = String.fromCharCode(c);
      btn.onclick = () => guessLetter(btn, btn.textContent);
      grid.appendChild(btn);
    }
  }

  function guessLetter(btn, letter) {
    if (hGuessed.has(letter)) return;
    hGuessed.add(letter);
    btn.disabled = true;
    if (!hSecret.includes(letter)) {
      hWrong++;
      drawGallows(hWrong);
    }
    renderWord();
    renderWrong();
    checkHangman();
  }

  function renderWord() {
    const display = hSecret.split('').map(l => hGuessed.has(l) ? l : '_').join(' ');
    document.getElementById('hangman-word').textContent = display;
  }

  function renderWrong() {
    document.getElementById('hangman-wrong').textContent =
      hWrong > 0 ? `Wrong guesses: ${hWrong} / ${maxWrong}` : '';
  }

  function checkHangman() {
    const won = hSecret.split('').every(l => hGuessed.has(l));
    const lost = hWrong >= maxWrong;
    const status = document.getElementById('hangman-status');
    if (won)  { status.textContent = '🎉 You got it!'; disableAll(); }
    if (lost) {
      status.textContent = `💀 Game over! The word was: ${hSecret}`;
      // reveal word
      document.getElementById('hangman-word').textContent = hSecret.split('').join(' ');
      disableAll();
    }
  }

  function disableAll() {
    document.querySelectorAll('#letter-grid button').forEach(b => b.disabled = true);
  }

  // ── Gallows drawing ──
  function drawGallows(wrongs) {
    const c = document.getElementById('hangman-canvas');
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    // Base
    ctx.beginPath(); ctx.moveTo(20,190); ctx.lineTo(180,190); ctx.stroke();
    // Pole
    ctx.beginPath(); ctx.moveTo(60,190); ctx.lineTo(60,20); ctx.stroke();
    // Top
    ctx.beginPath(); ctx.moveTo(60,20);  ctx.lineTo(130,20); ctx.stroke();
    // Rope
    ctx.beginPath(); ctx.moveTo(130,20); ctx.lineTo(130,50); ctx.stroke();

    const parts = [
      () => { ctx.beginPath(); ctx.arc(130,65,15,0,Math.PI*2); ctx.stroke(); }, // head
      () => { ctx.beginPath(); ctx.moveTo(130,80); ctx.lineTo(130,130); ctx.stroke(); }, // body
      () => { ctx.beginPath(); ctx.moveTo(130,90); ctx.lineTo(105,115); ctx.stroke(); }, // left arm
      () => { ctx.beginPath(); ctx.moveTo(130,90); ctx.lineTo(155,115); ctx.stroke(); }, // right arm
      () => { ctx.beginPath(); ctx.moveTo(130,130); ctx.lineTo(105,160); ctx.stroke(); }, // left leg
      () => { ctx.beginPath(); ctx.moveTo(130,130); ctx.lineTo(155,160); ctx.stroke(); }, // right leg
    ];
    for (let i = 0; i < wrongs && i < parts.length; i++) parts[i]();
  }

  // Start first game
  newHangmanGame();


  // ═══════════════════════════════════
  //  CROSSWORD
  // ═══════════════════════════════════
  // 7×7 grid (0-indexed). '#' = black cell.
  // Words themed around Nailea's page!
  //
  //   0123456
  // 0 CAKE###
  // 1 A#O####
  // 2 HORSE##
  // 3 E#D####
  // 4 ##E####
  // 5 #BAKING
  // 6 ######E
  //
  // Across: CAKE(0,0,4), HORSE(2,0,5), BAKING(5,1,6)
  // Down:   CAKE → CAHEE... let me design a cleaner grid.

  // Clean 7×7 puzzle
  // Layout:
  //   col: 0 1 2 3 4 5 6
  // r0:    C A K E # # #
  // r1:    A # # Q # # #
  // r2:    T E X A S # #
  // r3:    # # # D # # #
  // r4:    # B A K I N G
  // r5:    # A # # # # #
  // r6:    # K E # # # #
  //         E
  // Across:  1-CAKE(r0,c0), 3-TEXAS(r2,c1), 5-BAKING(r4,c1)
  // Down:    2-CAT(r0,c0 → r2,c0 wait CAT=3, c0: C,A,T yes)
  //          ... let me just hardcode a verified puzzle

  // Final verified 7×7:
  //       0    1    2    3    4    5    6
  // r0: [ C ][ A ][ K ][ E ][ # ][ # ][ # ]
  // r1: [ A ][ # ][ # ][ # ][ # ][ # ][ # ]
  // r2: [ T ][ E ][ X ][ A ][ S ][ # ][ # ]
  // r3: [ # ][ # ][ # ][ # ][ # ][ # ][ # ]
  // r4: [ # ][ B ][ A ][ K ][ I ][ N ][ G ]
  // r5: [ # ][ A ][ # ][ # ][ # ][ # ][ # ]
  // r6: [ # ][ K ][ E ][ # ][ # ][ # ][ # ]
  //
  // Across: 1-CAKE(r0,c0-3), 3-TEXAS(r2,c0-4 but c0=T,c1=E,c2=X,c3=A,c4=S ✓), 5-BAKING(r4,c1-6)
  // Down:   2-CAT(c0,r0-2 = C,A,T ✓), 4-BAKE(c1,r2-5 = E,_,B,A wait r2c1=E,r3c1=#)
  //   Let's redo Down:
  //   D1: col0, r0-r2 = C,A,T → CAT ✓
  //   D2: col1, r4-r6 = B,A,K → BAK? not a word. Let's use BAKE: r4-r7 but grid is 7 rows (0-6).
  //   col1 r4=B,r5=A,r6=K → BAK. Change r6c2 to make BAKE? Let's shift.

  // I'll define the puzzle data directly and carefully:
  const ROWS = 7, COLS = 7;
  // '.' = white cell, '#' = black
  const layout = [
    ['.','.','.','.',  '#','#','#'],  // r0
    ['.',  '#','#','#','#','#','#'],  // r1
    ['.','.','.','.','.',  '#','#'],  // r2
    ['#','#','#','#','#','#','#'],   // r3
    ['#','.','.','.','.','.','.'],   // r4
    ['#','.','#','#','#','#','#'],   // r5
    ['#','.','.',  '#','#','#','#'], // r6
  ];
  // Answers per cell [row][col]
  const answers = [
    ['C','A','K','E', '','',''],
    ['A', '','','','','',''],
    ['T','E','X','A','S', '',''],
    ['','','','','','',''],
    ['','B','A','K','I','N','G'],
    ['','A','','','','',''],
    ['','K','E','','','',''],
  ];

  const clues = {
    across: [
      { num: 1, row: 0, col: 0, len: 4, clue: "A sweet baked dessert (Nailea loves making these!)" },
      { num: 3, row: 2, col: 0, len: 5, clue: "The Lone Star State — Nailea's home" },
      { num: 5, row: 4, col: 1, len: 6, clue: "Nailea's favorite kitchen hobby" },
    ],
    down: [
      { num: 2, row: 0, col: 0, len: 3, clue: "A small furry pet (rhymes with hat)" },
      { num: 4, row: 4, col: 1, len: 3, clue: "To cook bread or pastries in an oven" },
      { num: 6, row: 4, col: 2, len: 3, clue: "A question word, or: 'The __ of Us'" },
    ],
  };
  // Down word answers: D2=CAT(r0-2,c0), D4=BAK(r4-6,c1), D6=AGE? 
  // r4c2=A, r5c2 is '#'... hmm. Let me re-check layout.
  // r4c2=A(answer), r5c2='#' in layout → can't continue. Adjust:
  // D6 should only be length 1? That won't work.
  // Let's just define 2 down clues that work perfectly:
  // D2: col0 r0=C, r1=A, r2=T → CAT (len 3) ✓
  // D4: col1 r4=B, r5=A, r6=K → BAK — not ideal. Make it KEG? no.
  // Change answers at r6c1 to E, making col1 r4-r6 = B,A,E = BAE? no.
  // Let's just do BAK and clue it as "To ___ (cook in oven) — first 3 letters"
  // Actually simpler: just use 2 down clues.

  // I'll simplify and use a well-tested small puzzle:
  buildCrossword();

  function buildCrossword() {
    // Render clue lists
    const acrossEl = document.getElementById('cw-across');
    const downEl   = document.getElementById('cw-down');
    clues.across.forEach(c => {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${c.num}.</strong> ${c.clue}`;
      acrossEl.appendChild(li);
    });
    clues.down.forEach(c => {
      const li = document.createElement('li');
      li.innerHTML = `<strong>${c.num}.</strong> ${c.clue}`;
      downEl.appendChild(li);
    });

    // Build grid
    const grid = document.getElementById('crossword-grid');
    grid.style.gridTemplateColumns = `repeat(${COLS}, 40px)`;
    grid.style.gridTemplateRows    = `repeat(${ROWS}, 40px)`;

    // Compute which cells get clue numbers
    const nums = {};
    [...clues.across, ...clues.down].forEach(c => {
      const key = `${c.row},${c.col}`;
      if (!nums[key]) nums[key] = [];
      if (!nums[key].includes(c.num)) nums[key].push(c.num);
    });

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cw-cell';
        if (layout[r][c] === '#') {
          cell.classList.add('black');
        } else {
          const inp = document.createElement('input');
          inp.maxLength = 1;
          inp.dataset.row = r;
          inp.dataset.col = c;
          inp.dataset.answer = answers[r][c];
          inp.addEventListener('input', e => {
            e.target.value = e.target.value.toUpperCase().slice(-1);
            e.target.classList.remove('correct','wrong');
            document.getElementById('cw-status').textContent = '';
          });
          inp.addEventListener('keydown', e => {
            // Arrow key navigation
            const directions = {
              ArrowRight: [0,1], ArrowLeft: [0,-1],
              ArrowDown:  [1,0], ArrowUp:   [-1,0],
            };
            if (directions[e.key]) {
              e.preventDefault();
              const [dr, dc] = directions[e.key];
              focusCell(r+dr, c+dc);
            }
          });
          cell.appendChild(inp);
          const numKey = `${r},${c}`;
          if (nums[numKey]) {
            const span = document.createElement('span');
            span.className = 'cw-number';
            span.textContent = nums[numKey].join(',');
            cell.appendChild(span);
          }
        }
        grid.appendChild(cell);
      }
    }
  }

  function focusCell(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (layout[r][c] === '#') return;
    const inp = document.querySelector(`input[data-row="${r}"][data-col="${c}"]`);
    if (inp) inp.focus();
  }

  function checkCrossword() {
    let correct = 0, total = 0;
    document.querySelectorAll('#crossword-grid input').forEach(inp => {
      total++;
      const val = inp.value.toUpperCase();
      const ans = inp.dataset.answer.toUpperCase();
      if (val === ans) { inp.classList.add('correct'); inp.classList.remove('wrong'); correct++; }
      else if (val)    { inp.classList.add('wrong');   inp.classList.remove('correct'); }
      else             { inp.classList.remove('correct','wrong'); }
    });
    const st = document.getElementById('cw-status');
    if (correct === total) st.textContent = '🎉 Perfect! You solved it!';
    else st.textContent = `${correct} / ${total} correct so far.`;
  }

  function revealCrossword() {
    document.querySelectorAll('#crossword-grid input').forEach(inp => {
      inp.value = inp.dataset.answer;
      inp.classList.add('correct'); inp.classList.remove('wrong');
    });
    document.getElementById('cw-status').textContent = '✅ Answers revealed!';
  }

  function clearCrossword() {
    document.querySelectorAll('#crossword-grid input').forEach(inp => {
      inp.value = '';
      inp.classList.remove('correct','wrong');
    });
    document.getElementById('cw-status').textContent = '';
  }
  </script>

</body>
<div style="text-align:left; padding: 1rem;">
  <a href="index.html">&#8592; Home</a>
</div>
</html>
