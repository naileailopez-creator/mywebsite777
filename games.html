<!DOCTYPE html>
<html>
<head>
  <title>Games – Nailea Lopez's Webpage</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Games page extra styles ── */
    .games-hero {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }
    .games-hero h1 { margin-bottom: 0.25rem; }
    .games-hero p  { color: #555; margin-top: 0; }

    .game-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.5rem auto 0;
      max-width: 700px;
    }
    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid #333;
      border-radius: 8px 8px 0 0;
      background: #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tab-btn.active { background: #fff; border-bottom: 2px solid #fff; }
    .tab-btn:hover:not(.active) { background: #e0e0e0; }

    .game-panel {
      display: none;
      max-width: 700px;
      margin: 0 auto 2rem;
      padding: 1.5rem;
      border: 2px solid #333;
      border-radius: 0 0 12px 12px;
      background: #fff;
    }
    .game-panel.active { display: block; }

    /* ── Hangman ── */
    #hangman-canvas { display: block; margin: 0 auto 1rem; }
    #hangman-word {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 0.4rem;
      margin: 0.5rem 0;
      font-family: monospace;
    }
    #hangman-hint  { text-align: center; color: #666; font-style: italic; margin-bottom: 0.75rem; }
    #hangman-wrong { text-align: center; color: #c0392b; margin-bottom: 0.75rem; }
    .letter-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1rem;
    }
    .letter-grid button {
      width: 38px; height: 38px;
      border: 1px solid #999;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      background: #fafafa;
      cursor: pointer;
      transition: background 0.15s;
    }
    .letter-grid button:disabled { background: #ddd; color: #aaa; cursor: default; }
    #hangman-status { text-align: center; font-weight: bold; font-size: 1.1rem; min-height: 1.5rem; }
    #hangman-new-btn {
      display: block; margin: 0.75rem auto 0;
      padding: 0.5rem 1.5rem;
      background: #333; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.95rem; cursor: pointer;
    }
    #hangman-new-btn:hover { background: #555; }

    /* ── Crossword ── */
    #crossword-grid {
      display: grid;
      gap: 2px;
      margin: 0 auto 1rem;
      width: fit-content;
    }
    .cw-cell {
      position: relative;
      width: 40px; height: 40px;
    }
    .cw-cell.black { background: #222; border-radius: 3px; }
    .cw-cell input {
      width: 100%; height: 100%;
      text-align: center;
      text-transform: uppercase;
      font-size: 1.1rem;
      font-weight: bold;
      border: 1px solid #999;
      border-radius: 3px;
      background: #fff;
      caret-color: transparent;
      outline: none;
    }
    .cw-cell input:focus { border-color: #e74c3c; background: #fff9f9; }
    .cw-cell input.correct { background: #d5f5e3; }
    .cw-cell input.wrong   { background: #fadbd8; }
    .cw-number {
      position: absolute; top: 2px; left: 3px;
      font-size: 0.5rem; font-weight: bold; color: #333;
      pointer-events: none; line-height: 1;
    }
    .cw-clues { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .cw-clues div { flex: 1; min-width: 200px; }
    .cw-clues h4 { margin: 0 0 0.5rem; }
    .cw-clues ol { padding-left: 1.2rem; margin: 0; }
    .cw-clues li { margin-bottom: 0.35rem; font-size: 0.9rem; }
    .cw-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .cw-actions button {
      padding: 0.5rem 1.2rem;
      background: #333; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer;
    }
    .cw-actions button:hover { background: #555; }
    #cw-status { text-align: center; font-weight: bold; font-size: 1rem; min-height: 1.4rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
  </nav>

  <div class="games-hero">
    <h1 class="page-title">🎮 Game Room</h1>
    <p>Pick a game and play with friends!</p>
  </div>

  <!-- Tab buttons -->
  <div class="game-tabs">
    <button class="tab-btn active" onclick="showTab('hangman', this)">🪢 Hangman</button>
   <button class="tab-btn"        onclick="showTab('london', this)"> Guess the Place</button>
  </div>

  <!-- ══════════ HANGMAN PANEL ══════════ -->
  <div id="hangman" class="game-panel active">
    <canvas id="hangman-canvas" width="200" height="200"></canvas>
    <div id="hangman-hint"></div>
    <div id="hangman-word"></div>
    <div id="hangman-wrong"></div>
    <div class="letter-grid" id="letter-grid"></div>
    <div id="hangman-status"></div>
    <button id="hangman-new-btn" onclick="newHangmanGame()">New Word</button>
  </div>
  <!-- ══════════ LONDON GUESS THE PLACE ══════════ -->
  <div id="london" class="game-panel">
    <div style="text-align:center;">
      <h2 style="margin-bottom:0.25rem;color: #333;"> Guess the London Place</h2>
      <p style="color:#555; margin-top:0;">Can you name these famous London landmarks?</p>
      <div id="london-score" style="font-weight:bold; margin-bottom:1rem;color: #333;">Score: 0 / 10</div>
      <div id="london-clues" style="font-size:1.1rem; background:#f9f9f9; border:1px solid #ddd; border-radius:10px; padding:1rem; margin-bottom:1rem; min-height:80px;color: #333;"></div>
      <input id="london-input" type="text" placeholder="Type your answer here..."
        style="padding:0.5rem 1rem; font-size:1rem; border:1px solid #999; border-radius:8px; width:60%; margin-bottom:0.75rem;" />
      <br/>
      <button onclick="checkLondon()" style="padding:0.5rem 1.2rem; background:#333; color:#fff; border:none; border-radius:8px; font-size:0.95rem; cursor:pointer; margin-right:0.5rem;">Submit</button>
      <button onclick="skipLondon()" style="padding:0.5rem 1.2rem; background:#888; color:#fff; border:none; border-radius:8px; font-size:0.95rem; cursor:pointer;">Skip</button>
      <div id="london-feedback" style="margin-top:0.75rem; font-weight:bold; font-size:1rem; min-height:1.5rem;"></div>
      <div id="london-reveal" style="color:#555; font-style:italic; margin-top:0.25rem;"></div>
      <button id="london-next" onclick="nextLondon()" style="display:none; margin-top:0.75rem; padding:0.5rem 1.5rem; background:#333; color:#fff; border:none; border-radius:8px; cursor:pointer;">Next ➜</button>
      <div id="london-end" style="display:none; text-align:center; margin-top:1rem;">
        <h3 id="london-final"></h3>
        <button onclick="restartLondon()" style="padding:0.5rem 1.5rem; background:#333; color:#fff; border:none; border-radius:8px; cursor:pointer;">Play Again</button>
      </div>
    </div>
  </div>

  

  <footer class="page-footer">
    Copyright &copy; 2026 Nailea Lopez. All Rights Reserved.
  </footer>

  <script>
  // ═══════════════════════════════════
  //  TAB SWITCHING
  // ═══════════════════════════════════
  function showTab(id, btn) {
    document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
	if (id === 'london') showLondonClue();
  }

  // ═══════════════════════════════════
  //  HANGMAN
  // ═══════════════════════════════════
  const words = [
    { word: "BAKING",     hint: "Nailea's favorite hobby in the kitchen" },
    { word: "HORSEBACK",  hint: "Nailea has been doing this since age 6" },
    { word: "AUSTIN",     hint: "City where UT is located" },
    { word: "BUSINESS",   hint: "Nailea's school at UT" },
    { word: "LONDON",     hint: "City with a famous red phone booth" },
    { word: "CROISSANT",  hint: "A classic French pastry" },
    { word: "GASTRONOMY", hint: "The study of food and culture" },
    { word: "TRAVEL",     hint: "One of Nailea's passions" },
    { word: "CUPCAKE",    hint: "A small single-serving cake" },
    { word: "SADDLE",     hint: "You sit on this when riding a horse" },
  ];

  let hSecret, hGuessed, hWrong;
  const maxWrong = 6;

  function newHangmanGame() {
    const pick = words[Math.floor(Math.random() * words.length)];
    hSecret  = pick.word;
    hGuessed = new Set();
    hWrong   = 0;
    document.getElementById('hangman-hint').textContent = "Hint: " + pick.hint;
    document.getElementById('hangman-status').textContent = '';
    buildLetterGrid();
    renderWord();
    renderWrong();
    drawGallows(0);
  }

  function buildLetterGrid() {
    const grid = document.getElementById('letter-grid');
    grid.innerHTML = '';
    for (let c = 65; c <= 90; c++) {
      const btn = document.createElement('button');
      btn.textContent = String.fromCharCode(c);
      btn.onclick = () => guessLetter(btn, btn.textContent);
      grid.appendChild(btn);
    }
  }

  function guessLetter(btn, letter) {
    if (hGuessed.has(letter)) return;
    hGuessed.add(letter);
    btn.disabled = true;
    if (!hSecret.includes(letter)) {
      hWrong++;
      drawGallows(hWrong);
    }
    renderWord();
    renderWrong();
    checkHangman();
  }

  function renderWord() {
    const display = hSecret.split('').map(l => hGuessed.has(l) ? l : '_').join(' ');
    document.getElementById('hangman-word').textContent = display;
  }

  function renderWrong() {
    document.getElementById('hangman-wrong').textContent =
      hWrong > 0 ? `Wrong guesses: ${hWrong} / ${maxWrong}` : '';
  }

  function checkHangman() {
    const won = hSecret.split('').every(l => hGuessed.has(l));
    const lost = hWrong >= maxWrong;
    const status = document.getElementById('hangman-status');
    if (won)  { status.textContent = '🎉 You got it!'; disableAll(); }
    if (lost) {
      status.textContent = `💀 Game over! The word was: ${hSecret}`;
      // reveal word
      document.getElementById('hangman-word').textContent = hSecret.split('').join(' ');
      disableAll();
    }
  }

  function disableAll() {
    document.querySelectorAll('#letter-grid button').forEach(b => b.disabled = true);
  }

  // ── Gallows drawing ──
  function drawGallows(wrongs) {
    const c = document.getElementById('hangman-canvas');
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    // Base
    ctx.beginPath(); ctx.moveTo(20,190); ctx.lineTo(180,190); ctx.stroke();
    // Pole
    ctx.beginPath(); ctx.moveTo(60,190); ctx.lineTo(60,20); ctx.stroke();
    // Top
    ctx.beginPath(); ctx.moveTo(60,20);  ctx.lineTo(130,20); ctx.stroke();
    // Rope
    ctx.beginPath(); ctx.moveTo(130,20); ctx.lineTo(130,50); ctx.stroke();

    const parts = [
      () => { ctx.beginPath(); ctx.arc(130,65,15,0,Math.PI*2); ctx.stroke(); }, // head
      () => { ctx.beginPath(); ctx.moveTo(130,80); ctx.lineTo(130,130); ctx.stroke(); }, // body
      () => { ctx.beginPath(); ctx.moveTo(130,90); ctx.lineTo(105,115); ctx.stroke(); }, // left arm
      () => { ctx.beginPath(); ctx.moveTo(130,90); ctx.lineTo(155,115); ctx.stroke(); }, // right arm
      () => { ctx.beginPath(); ctx.moveTo(130,130); ctx.lineTo(105,160); ctx.stroke(); }, // left leg
      () => { ctx.beginPath(); ctx.moveTo(130,130); ctx.lineTo(155,160); ctx.stroke(); }, // right leg
    ];
    for (let i = 0; i < wrongs && i < parts.length; i++) parts[i]();
  }

  // Start first game
  newHangmanGame();
 
  // ═══════════════════════════════════
  //  LONDON GUESS THE PLACE
  // ═══════════════════════════════════
  const londonPlaces = [
    { name: "Big Ben", clues: ["🕰️ I am a famous clock tower", "📍 I sit next to the River Thames", "🏛️ I am part of the Houses of Parliament"] },
    { name: "Tower Bridge", clues: ["🌉 I am a bridge that can open in the middle", "📍 I cross the River Thames near the Tower of London", "🔵 I am painted blue and grey"] },
    { name: "Buckingham Palace", clues: ["👑 I am the official home of the King", "💂 Guards in tall black hats stand outside me", "📍 I am at the end of The Mall"] },
    { name: "The London Eye", clues: ["🎡 I am a giant observation wheel", "📍 I sit on the South Bank of the Thames", "🌆 I give you amazing views of the city from above"] },
    { name: "Tower of London", clues: ["🏰 I am a historic castle", "💎 The Crown Jewels are kept inside me", "📍 I am right next to Tower Bridge"] },
    { name: "Stonehenge", clues: ["🪨 I am made of massive standing stones", "🌅 I align with the sun on the summer solstice", "📍 I am in Wiltshire, about 2 hours from London"] },
    { name: "St Paul's Cathedral", clues: ["⛪ I am a famous domed church", "📍 I am in the City of London", "🎶 Princess Diana got married inside me"] },
    { name: "Hyde Park", clues: ["🌳 I am one of London's largest royal parks", "🐾 You can ride horses through me", "📍 I am near Kensington"] },
    { name: "Trafalgar Square", clues: ["🦁 Four bronze lions guard a tall column in my center", "🕊️ I am famous for my pigeons", "📍 I am near the National Gallery"] },
    { name: "Covent Garden", clues: ["🎭 I am known for street performers and markets", "🛍️ I have lots of shops and restaurants", "📍 I am in the West End of London"] },
  ];

  let londonIndex = 0, londonScore = 0, londonClueStep = 0, londonAnswered = false;
  const londonOrder = [...londonPlaces].sort(() => Math.random() - 0.5);

  function showLondonClue() {
    const place = londonOrder[londonIndex];
    const clueEl = document.getElementById('london-clues');
    clueEl.innerHTML = place.clues.slice(0, londonClueStep + 1).map(c => `<p style="margin:0.3rem 0">${c}</p>`).join('');
    document.getElementById('london-feedback').textContent = '';
    document.getElementById('london-reveal').textContent = '';
    document.getElementById('london-next').style.display = 'none';
    document.getElementById('london-input').value = '';
    document.getElementById('london-input').disabled = false;
  }

  function checkLondon() {
    if (londonAnswered) return;
    const input = document.getElementById('london-input').value.trim().toLowerCase();
    const answer = londonOrder[londonIndex].name.toLowerCase();
    const feedback = document.getElementById('london-feedback');
    if (input === answer) {
      feedback.textContent = '🎉 Correct!';
      feedback.style.color = 'green';
      londonScore++;
      document.getElementById('london-score').textContent = `Score: ${londonScore} / 10`;
      finishLondonRound();
    } else if (londonClueStep < 2) {
      londonClueStep++;
      feedback.textContent = '❌ Not quite! Here\'s another clue...';
      feedback.style.color = '#c0392b';
      showLondonClue();
    } else {
      feedback.textContent = '❌ Wrong!';
      feedback.style.color = '#c0392b';
      document.getElementById('london-reveal').textContent = `The answer was: ${londonOrder[londonIndex].name}`;
      finishLondonRound();
    }
  }

  function skipLondon() {
    if (londonAnswered) return;
    document.getElementById('london-feedback').textContent = '⏭️ Skipped!';
    document.getElementById('london-feedback').style.color = '#888';
    document.getElementById('london-reveal').textContent = `The answer was: ${londonOrder[londonIndex].name}`;
    finishLondonRound();
  }

  function finishLondonRound() {
    londonAnswered = true;
    document.getElementById('london-input').disabled = true;
    if (londonIndex < londonOrder.length - 1) {
      document.getElementById('london-next').style.display = 'inline-block';
    } else {
      const end = document.getElementById('london-end');
      const final = document.getElementById('london-final');
      end.style.display = 'block';
      document.getElementById('london-next').style.display = 'none';
      if (londonScore >= 8) final.textContent = `🏆 Amazing! You scored ${londonScore}/10 — you know London well!`;
      else if (londonScore >= 5) final.textContent = `👏 Good job! You scored ${londonScore}/10!`;
      else final.textContent = `😅 You scored ${londonScore}/10 — time to visit London!`;
    }
  }

  function nextLondon() {
    londonIndex++;
    londonClueStep = 0;
    londonAnswered = false;
    showLondonClue();
  }

  function restartLondon() {
    londonIndex = 0; londonScore = 0; londonClueStep = 0; londonAnswered = false;
    londonOrder.sort(() => Math.random() - 0.5);
    document.getElementById('london-score').textContent = 'Score: 0 / 10';
    document.getElementById('london-end').style.display = 'none';
    document.getElementById('london-input').disabled = false;
    showLondonClue();
  }

  // Start first London clue
  window.onload = function() {
  newHangmanGame();
  // We need to make sure the game logic knows which place to start with
  londonIndex = 0; 
  showLondonClue();
};
</script>
</body>
</html>
